<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#127a71"/>
      <stop offset="1" stop-color="#0a4a45"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- three-arc session dial -->
  <g fill="none" stroke-width="34" stroke-linecap="round" transform="rotate(-90 256 256)">
    <circle cx="256" cy="256" r="132" stroke="#0c504a"/>
    <circle cx="256" cy="256" r="132" stroke="#5cb4aa" stroke-dasharray="246 583" stroke-dashoffset="0"/>
    <circle cx="256" cy="256" r="132" stroke="#e69a2e" stroke-dasharray="246 583" stroke-dashoffset="-277"/>
    <circle cx="256" cy="256" r="132" stroke="#c8503c" stroke-dasharray="246 583" stroke-dashoffset="-554"/>
  </g>
  <!-- center mark: a small path/sun dot -->
  <circle cx="256" cy="256" r="50" fill="#fbf6ec"/>
  <circle cx="256" cy="256" r="20" fill="#e69a2e"/>
</svg>
